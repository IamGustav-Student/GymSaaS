services:
  webapp:
    image: gymsaas-web
    container_name: gymsaas_app
    build:
      context: .
      dockerfile: src/GymSaaS.Web/Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      # Construimos la cadena de conexion usando las variables del .env
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASSWORD}
      # Variables de seguridad que agregamos antes
      - MercadoPago__AccessToken=${MP_ACCESS_TOKEN}
      - Security__EncryptionKey=${SECURITY_KEY}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - gym-network

  db:
    image: postgres:16
    container_name: gymsaas_db
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    ports:
      - "5432:5432"
    networks:
      - gym-network
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./dataprotection-keys:/app/keys # Mapea las llaves a tu carpeta local
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      retries: 5
      start_period: 10s

networks:
  gym-network:
    driver: bridge

volumes:
  pg_data: